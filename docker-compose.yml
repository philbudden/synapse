services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-synapse}
      POSTGRES_USER: ${POSTGRES_USER:-synapse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-synapse}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped

  api:
    build: ./api
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - "${API_PORT:-8000}:8000"
    restart: unless-stopped

  mcp:
    build: ./mcp
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "${MCP_PORT:-8080}:8080"
    restart: unless-stopped

  # Matrix homeserver (matrix.org Synapse). Enabled via the "matrix" profile.
  # Element X will connect to the TLS proxy on MATRIX_TLS_PORT.
  matrix-synapse:
    build: ./matrix-homeserver
    profiles: ["matrix"]
    env_file:
      - .env
    environment:
      MATRIX_SERVER_NAME: ${MATRIX_SERVER_NAME:-localhost}
      MATRIX_REPORT_STATS: ${MATRIX_REPORT_STATS:-no}
      MATRIX_HTTP_PORT: ${MATRIX_HTTP_PORT:-8008}
    volumes:
      - matrix_synapse_data:/data
    ports:
      - "${MATRIX_HTTP_PORT:-8008}:8008"
    restart: unless-stopped

  matrix-proxy:
    image: caddy:2.8
    profiles: ["matrix"]
    environment:
      MATRIX_TLS_PORT: ${MATRIX_TLS_PORT:-8448}
      # Optional: set this to a stable hostname that matches your TLS certificate.
      # Recommended values:
      # - https://mac-workstation (if you publish 443)
      # - https://mac-workstation.<tailnet>.ts.net (on Tailscale)
      MATRIX_PUBLIC_BASE_URL: ${MATRIX_PUBLIC_BASE_URL:-}
      # Optional: federation discovery value for /.well-known/matrix/server
      MATRIX_PUBLIC_SERVER_NAME: ${MATRIX_PUBLIC_SERVER_NAME:-}
    volumes:
      - ./matrix-proxy/entrypoint.sh:/entrypoint.sh:ro
      - matrix_caddy_data:/data
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "${MATRIX_TLS_PORT:-8448}:${MATRIX_TLS_PORT:-8448}"
      # Element X and Matrix discovery often expect HTTPS on 443.
      - "443:${MATRIX_TLS_PORT:-8448}"
    depends_on:
      - matrix-synapse
    restart: unless-stopped

  matrix-bot:
    build: ./matrix
    profiles: ["matrix"]
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - api
      - matrix-synapse
    restart: unless-stopped

volumes:
  postgres_data:
  matrix_synapse_data:
  matrix_caddy_data:
